{{ if eq .File.ContentBaseName "统一调度平台的价值与实践" }}

      "name": "什么是AI治理与调度平台？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AI治理与调度平台可以理解为企业的'AI能力总线与中枢'，它统一管理多家LLM、私有大模型、传统ML服务和自研业务插件。对上暴露统一的API入口，对下统一承载各种AI服务，中间负责智能调度（路由+负载均衡+熔断降级）、监控与成本治理。"

      "@type": "Question",

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "企业在使用大模型时面临四大痛点：模型碎片化（多套接入方式、多处配置）、成本不可控（不知道谁用了多少、花在了哪些模型上）、缺乏智能调度（简单任务用最贵模型）、智能化能力无法沉淀（每个项目都重写一遍）。平台解决了这些问题，让AI使用从'分散调用'变成'统一管理'。"
      }
    },
    {
      "@type": "Question",
      "name": "AI治理与调度平台如何降低企业AI成本？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "平台通过精准统计（对每次调用的Token与成本做精细记录）、成本偏好参数、业务等级参数、智能调度（高价值业务用更好的模型，低价值任务调度到低成本模型）、数据驱动决策（哪些模型'贵但不值'、哪些'便宜好用'有数据支撑）等方式降低成本。"
      }
    },
    {
      "@type": "Question",
      "name": "平台如何实现智能调度？",

        "@type": "Answer",
        "text": "平台的智能调度基于多维因素自动路由：业务声明（业务等级、成本偏好、能力标签）、模型状态（健康状态监控）、负载监控（并发与QPS压力）、历史表现（错误率与延迟）、成本约束，自动完成'选模型、分流量、做降级'的调度决策。"
      }
    },
    {
      "@type": "Question",
      "name": "什么是Prompt模板中心？有什么价值？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Prompt模板中心是平台将关键Prompt从业务代码中抽离，集中管理的功能，支持分类组织、版本管理、在线编辑、热更新和绑定调度。价值在于：新项目从'成熟模板+小改动'开始，模板优化后所有使用它的插件和业务一起受益，Prompt变成可见、可管、可迭代的'文本代码资产'。"
      }
    },
    {
      "@type": "Question",
      "name": "平台如何帮助沉淀智能资产？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "平台通过三种机制沉淀智能资产：插件生态（自研AI能力以插件方式接入，做到'可插拔、可复用、可统一调度'）、服务注册（传统ML/外部AI服务通过注册机制纳管）、Prompt模板中心（沉淀高质量Prompt模板）。每个项目在解决业务问题的同时，也在给平台贡献新插件、新Prompt模板、新的组合与实践经验。"
      }
    },

      }
    },
    {
      "@type": "Question",

        "@type": "Answer",

      }

      }
    },
    {

      "name": "平台与传统'每个系统自己接模型'模式有何不同？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "传统模式：每个系统自己管Key、自己写错误处理、自己做限流和重试，切换模型需要'全公司协同+改代码'，成本不可控，能力无法沉淀。平台模式：统一API入口，业务只对接平台，调整只需'调一处平台配置'，精准统计成本，智能资产持续沉淀与演进。从'项目导向'到'资产导向'，让每个项目都为企业AI资产池添砖加瓦。"
      }
    }
